kind = "web"
previewPath = "/"
title = "Ganesh Pawar Portfolio"
version = "1.0.0"
id = "artifacts/ganesh-portfolio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24908

[services.development]
run = "pnpm --filter @workspace/ganesh-portfolio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ganesh-portfolio", "run", "build" ]
publicDir = "artifacts/ganesh-portfolio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24908"
BASE_PATH = "/"
